services:

  # ==================== RABBITMQ ====================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: orders_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== SQL SERVER ====================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: orders_sqlserver
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$SA_PASSWORD\" -Q 'SELECT 1' -b -C 2>/dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$SA_PASSWORD\" -Q 'SELECT 1' -b 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ==================== API (Glavni servis) ====================
  orders-api:
    build:
      context: .
      dockerfile: OrdersAPI.API/Dockerfile
    container_name: orders_api
    ports:
      - "5220:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=220060;User Id=SA;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__User=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=OrdersAPI
      - Jwt__Audience=OrdersFlutterApp
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
      - Stripe__PublishableKey=${STRIPE_PUBLISHABLE_KEY}
      - Stripe__WebhookSecret=${STRIPE_WEBHOOK_SECRET}
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS}
      - App__PublicBaseUrl=${APP_PUBLIC_BASE_URL}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ==================== WORKER (Pomoćni mikroservis) ====================
  orders-worker:
    build:
      context: .
      dockerfile: OrdersAPI.Worker/Dockerfile
    container_name: orders_worker
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=220060;User Id=SA;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__User=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rabbitmq_data:
  sqlserver_data:
